# CubeSandbox transparent proxy — required sysctls.
#
# rp_filter must be 0 on all interfaces involved in the TPROXY path:
# the redirected packet appears on lo with src=public_ip, which
# would otherwise fail strict reverse-path validation.
#
# route_localnet allows non-127/8 destinations to be delivered via lo,
# which is what `ip route add local default dev lo table 100` relies on.
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.cube-dev.rp_filter = 0
net.ipv4.conf.lo.rp_filter = 0
net.ipv4.conf.all.route_localnet = 1
net.ipv4.conf.cube-dev.accept_local = 1
